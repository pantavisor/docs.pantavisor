name: Docs – ingest new release

# Triggered by another repo via the GitHub API:
#
#   gh workflow run docs-ingest.yml \
#     --repo pantavisor/docs.pantavisor \
#     -f artifact_url="https://host/meta-pantavisor.abc1234+028-rc12.docs.tar.zst" \
#     -f filename="meta-pantavisor.abc1234+028-rc12.docs.tar.zst"
#
# The filename must follow the pattern:
#   <image-name>.<short-hash>+<version>.docs.tar.zst
# The <version> segment becomes the new release version (e.g. 028-rc12).
#
# This workflow does NOT commit any generated docs. It records the release in
# releases.json (durable URL + sha256) and opens a PR. The build workflow
# regenerates reference/ + reference_versioned_docs/ from releases.json on every
# deploy (scripts/sync-reference.mjs). See README.md.

on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: 'Durable download URL of the .docs.tar.zst file'
        required: true
      filename:
        description: 'Filename  e.g. meta-pantavisor.abc1234+028-rc12.docs.tar.zst'
        required: true

jobs:
  ingest:
    name: Record docs release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Parse the version tag out of the filename ──────────────────────
      - name: Parse version from filename
        id: parse
        run: |
          FILENAME="${{ inputs.filename }}"
          VERSION=$(echo "$FILENAME" | sed 's/.*+\(.*\)\.docs\.tar\.\(zst\|gz\)$/\1/')
          if [ -z "$VERSION" ] || [ "$VERSION" = "$FILENAME" ]; then
            echo "::error::Cannot parse version from filename: $FILENAME"
            echo "::error::Expected pattern: <name>.<hash>+<version>.docs.tar.(zst|gz)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed version: $VERSION"

      # ── 2. Download artifact and compute its checksum ─────────────────────
      - name: Download artifact and hash it
        id: hash
        run: |
          curl -fL -o artifact.tarball "${{ inputs.artifact_url }}"
          SHA=$(sha256sum artifact.tarball | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA"

      # ── 3. Record the release in releases.json ────────────────────────────
      - name: Update releases.json
        env:
          NEW_VERSION: ${{ steps.parse.outputs.version }}
          ARTIFACT_URL: ${{ inputs.artifact_url }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const version = process.env.NEW_VERSION;
          const url = process.env.ARTIFACT_URL;
          const sha256 = process.env.SHA256;
          const channel = /rc/i.test(version) ? 'rc' : 'stable';

          const m = JSON.parse(fs.readFileSync('releases.json', 'utf8'));
          m.releases = (m.releases || []).filter(r => r.version !== version);
          m.releases.unshift({ version, channel, url, sha256 });
          m.current = version; // newest ingested becomes the default/current
          fs.writeFileSync('releases.json', JSON.stringify(m, null, 2) + '\n');
          console.log(`releases.json: current → ${version}; ${m.releases.length} releases`);
          EOF

      # ── 4. Node setup + verify the site builds from releases.json ─────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (verify — downloads + regenerates reference from releases.json)
        run: npm run build

      # ── 5. Open the PR (only releases.json changes) ───────────────────────
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "release/${{ steps.parse.outputs.version }}"
          base: master
          commit-message: "release: record docs ${{ steps.parse.outputs.version }} in releases.json"
          title: "release: ${{ steps.parse.outputs.version }} docs"
          add-paths: releases.json
          body: |
            ## New docs release: `${{ steps.parse.outputs.version }}`

            | | |
            |---|---|
            | **New version (now current)** | `${{ steps.parse.outputs.version }}` |
            | **Artifact** | `${{ inputs.filename }}` |
            | **sha256** | `${{ steps.hash.outputs.sha256 }}` |
            | **Workflow run** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            ### What this PR does
            - Records the release in `releases.json` (durable URL + sha256) and sets it as `current`.
            - **No generated docs are committed.** On merge, the build downloads the
              tarball, verifies the checksum, and regenerates `reference/` +
              `reference_versioned_docs/` via `scripts/sync-reference.mjs`.

            Merging will trigger the build-and-deploy workflow.
          delete-branch: true
