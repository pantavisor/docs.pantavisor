name: Docs – ingest new release

# Triggered by another repo (or manually) once a release's docs tarball has been
# published to the upstream manifest:
#   https://pantavisor-ci.s3.amazonaws.com/meta-pantavisor/releases.json
#
#   gh workflow run docs-ingest.yml \
#     --repo pantavisor/docs.pantavisor \
#     -f version=028-rc12
#   # or pass a filename and let the workflow parse the version from it:
#   gh workflow run docs-ingest.yml \
#     --repo pantavisor/docs.pantavisor \
#     -f filename="pantavisor-docs-028-rc12.tar.gz"
#
# This workflow records the version in releases.json (sets it as `current`) and
# opens a PR. It does NOT download anything or commit generated docs: the build
# resolves each version's tarball URL + sha256 from the upstream manifest and
# regenerates the reference docs (scripts/sync-reference.mjs). See README.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish, e.g. 028-rc12 (optional if filename is given)'
        required: false
      filename:
        description: 'Docs tarball filename to parse the version from (optional if version is given)'
        required: false

jobs:
  ingest:
    name: Record docs release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Determine the version (explicit input or parsed from filename) ──
      - name: Resolve version
        id: parse
        env:
          VERSION_IN: ${{ inputs.version }}
          FILENAME: ${{ inputs.filename }}
        run: |
          VERSION="$VERSION_IN"
          if [ -z "$VERSION" ] && [ -n "$FILENAME" ]; then
            # strip a leading "pantavisor-docs-" and a trailing ".tar.(gz|zst)",
            # or take the segment after the last '+' for <name>+<version>.* names
            V="${FILENAME##*+}"
            V="${V%.docs.tar.*}"; V="${V%.tar.*}"
            VERSION="${V#pantavisor-docs-}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Provide either the version input or a filename to parse."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ── 2. Record the version in releases.json (newest first, set current) ─
      - name: Update releases.json
        env:
          NEW_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const version = process.env.NEW_VERSION;
          const m = JSON.parse(fs.readFileSync('releases.json', 'utf8'));
          m.versions = [version, ...((m.versions || []).filter(v => v !== version))];
          m.current = version; // newest ingested becomes the default version
          fs.writeFileSync('releases.json', JSON.stringify(m, null, 2) + '\n');
          console.log(`releases.json: current → ${version}; versions = ${JSON.stringify(m.versions)}`);
          EOF

      # ── 3. Verify the site builds (resolves the tarball from the upstream
      #       manifest, verifies its sha256, and regenerates the reference) ───
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (verify)
        run: npm run build

      # ── 4. Open the PR (only releases.json changes) ───────────────────────
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "release/${{ steps.parse.outputs.version }}"
          base: master
          commit-message: "release: publish docs ${{ steps.parse.outputs.version }}"
          title: "release: ${{ steps.parse.outputs.version }} docs"
          add-paths: releases.json
          body: |
            ## Publish docs version: `${{ steps.parse.outputs.version }}`

            | | |
            |---|---|
            | **New version (now current)** | `${{ steps.parse.outputs.version }}` |
            | **Workflow run** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            ### What this PR does
            - Adds `${{ steps.parse.outputs.version }}` to `releases.json` `versions`
              and sets it as `current`.
            - **No generated docs are committed.** On merge, the build resolves the
              tarball URL + sha256 from the upstream manifest, verifies the
              checksum, and regenerates `reference/` + `reference_versioned_docs/`
              via `scripts/sync-reference.mjs`.

            Merging will trigger the build-and-deploy workflow.
          delete-branch: true
