name: Docs – build and deploy

# Triggers only when changes land on master (i.e. a PR is merged).
# Feature branches do not trigger this workflow on their own.
on:
  # Manual trigger (e.g. to re-fetch the upstream manifest without a repo change).
  workflow_dispatch:
  # Callable by docs-latest.yml, which rebuilds the site when meta-pantavisor
  # publishes fresh development docs. Callers must grant contents:read,
  # pages:write and id-token:write.
  workflow_call:
  # Triggers when changes land on master (i.e. a PR is merged). Generated docs
  # (reference/, reference_versioned_*, releases/, llms*.txt) are git-ignored, so
  # only the committed inputs that affect the build are listed here.
  push:
    branches:
      - master
    paths:
      - 'curated/**'
      - 'releases.json'
      - 'docusaurus.config.ts'
      - 'sidebarsCurated.ts'
      - 'sidebarsReference.ts'
      - 'src/**'
      - 'static/**'
      - 'migrate-docs.js'
      - 'scripts/**'
      - 'package*.json'
      - '!.github/workflows/**'

permissions:
  contents: read

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
