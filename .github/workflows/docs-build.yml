name: Docs – build and open PR

# Triggers only when changes land on master (i.e. a PR is merged).
# Feature branches do not trigger this workflow on their own.
on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'releases/**'
      - 'versioned_docs/**'
      - 'versioned_sidebars/**'
      - 'versions.json'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'src/**'
      - 'static/**'
      - 'migrate-docs.js'
      - 'package*.json'

jobs:
  build-and-pr:
    name: Build site and open deployment PR
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push the deploy branch
      pull-requests: write # needed to open the PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      # Commits the built static site to a deploy branch and opens a PR
      # to gh-pages for review before the site goes live.
      - name: Open deployment PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: build/
          branch: deploy/site-update
          base: gh-pages
          commit-message: "build: update static site output"
          title: "deploy: update site (${{ github.sha }})"
          body: |
            Built site update from merge into `master`.

            | | |
            |---|---|
            | **Source commit** | `${{ github.sha }}` |
            | **Workflow run** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            Merge this PR to publish the updated site to GitHub Pages.
          delete-branch: true
